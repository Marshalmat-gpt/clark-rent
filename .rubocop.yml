require:
  - rubocop-rails

AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.2
  Exclude:
    - 'db/**/*'
    - 'bin/**/*'
    - 'config/**/*'
    - 'vendor/**/*'
    - 'spec/**/*'
    - 'Gemfile'
    - 'Rakefile'

Layout/LineLength:
  Max: 120
Style/Documentation:
  Enabled: false
Style/FrozenStringLiteralComment:
  Enabled: false
Rails/FilePath:
  EnforcedStyle: arguments
Rails/UnknownEnv:
  Environments:
    - production
    - development
    - test
    - staging
    - local
# params.expect() is Rails 8.0+ — disable until we upgrade from 7.2
Rails/StrongParametersExpect:
  Enabled: false
