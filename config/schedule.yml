# Sidekiq-cron schedule. Loaded by config/initializers/sidekiq.rb when
# the process is a Sidekiq server (not in Rails console or RSpec).
#
# Cron syntax: minute hour day month weekday (UTC by default).

generate_monthly_rent_payments:
  cron: "0 4 1 * *"               # 04:00 UTC on the 1st of each month
  class: GenerateMonthlyRentPaymentsJob
  queue: default
  description: "Pre-generate the next 3 months of pending rent payments for every active lease."

ticket_sla_escalation:
  cron: "0 */6 * * *"             # every 6 hours on the hour
  class: TicketSlaEscalationJob
  queue: default
  description: "Notify landlords of urgent tickets open more than 48h."

lease_irl_anniversary:
  cron: "0 7 * * *"             # 07:00 UTC daily (~ 08:00 Paris winter)
  class: LeaseIrlAnniversaryReminderJob
  queue: default
  description: "Email landlords on a lease anniversary to prompt an IRL revision."
