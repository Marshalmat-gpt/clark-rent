default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>

development:
  <<: *default
  database: clark_development
  username: <%= ENV.fetch('DB_USERNAME', 'clark') %>
  password: <%= ENV.fetch('DB_PASSWORD', 'clark') %>
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>

test:
  <<: *default
  database: clark_test
  username: <%= ENV.fetch('DB_USERNAME', 'clark') %>
  password: <%= ENV.fetch('DB_PASSWORD', 'clark') %>
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
