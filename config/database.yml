default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>

development:
  <<: *default
  database: clark_development
  username: <%= ENV.fetch('DB_USERNAME', 'clark') %>
  password: <%= ENV.fetch('DB_PASSWORD', 'clark') %>
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>

test:
  <<: *default
  # Use DATABASE_URL when set (CI), fall back to individual env vars for local dev.
  # Using `url:` ensures Rails 7.2 picks up the connection string unambiguously.
  url: <%= ENV.fetch('DATABASE_URL', "postgresql://#{ENV.fetch('DB_USERNAME', 'clark')}:#{ENV.fetch('DB_PASSWORD', 'clark')}@#{ENV.fetch('DB_HOST', 'localhost')}/clark_test") %>

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
